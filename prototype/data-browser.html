<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>408 专业方向数据浏览 — 考研择校决策平台</title>
<style>
:root {
  --bg: #f6f5f3;
  --surface: #fff;
  --border: #e6e4e0;
  --text: #1d1b1a;
  --text-secondary: #6b6560;
  --text-tertiary: #9b9590;
  --accent: #1a3a5c;
  --accent-light: #e8f0f8;
  --gold: #b8943c;
  --tag-985: #fdf3e4;
  --tag-985-text: #9b6b1a;
  --tag-211: #eaf0f8;
  --tag-211-text: #2d5a8c;
  --tag-df: #eaf5ef;
  --tag-df-text: #2d6a4f;
  --tag-pub: #f2f2f0;
  --tag-pub-text: #5c5650;
  --full: #1a7a4c;
  --part: #7a5a1a;
  --radius-sm: 5px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
  --font: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --mono: "SF Mono", "Cascadia Code", "Consolas", monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 14px; scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  display: flex;
  min-height: 100vh;
}

/* ===== Sidebar ===== */
.sidebar {
  width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 10;
  overflow: hidden;
}

.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header .logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}

.sidebar-header .logo-icon {
  width: 34px; height: 34px;
  border-radius: var(--radius-sm);
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
}

.sidebar-header h2 {
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  color: var(--text);
}

.sidebar-header .subtitle {
  font-size: 0.7rem;
  color: var(--text-tertiary);
  letter-spacing: 0.06em;
}

.sidebar-search {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-search input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.82rem;
  font-family: var(--font);
  background: var(--bg);
  outline: none;
  transition: border-color 0.2s;
}
.sidebar-search input:focus { border-color: var(--accent); }

.province-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.province-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 20px;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 0.84rem;
  border-left: 3px solid transparent;
  color: var(--text-secondary);
}

.province-item:hover { background: var(--bg); color: var(--text); }
.province-item.active {
  background: var(--accent-light);
  border-left-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}

.province-item .count {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--text-tertiary);
  background: var(--bg);
  padding: 1px 7px;
  border-radius: 10px;
}

.province-item.active .count {
  background: var(--accent);
  color: #fff;
}

.sidebar-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  font-size: 0.72rem;
  color: var(--text-tertiary);
}

/* ===== Main ===== */
.main {
  margin-left: 260px;
  flex: 1;
  padding: 28px 32px 80px;
  max-width: calc(100vw - 260px);
}

.page-header {
  margin-bottom: 24px;
}

.page-header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  margin-bottom: 4px;
}

.page-header .summary {
  font-size: 0.84rem;
  color: var(--text-secondary);
}

.page-header .summary strong { color: var(--text); }

/* ===== Stats Row ===== */
.stats-row {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
}

.stat-mini {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 18px;
  min-width: 120px;
}
.stat-mini .num {
  font-family: var(--mono);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--accent);
}
.stat-mini .label {
  font-size: 0.73rem;
  color: var(--text-tertiary);
  margin-top: 2px;
}

/* ===== Filter Chips ===== */
.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-label {
  font-size: 0.78rem;
  color: var(--text-tertiary);
  font-weight: 500;
  margin-right: 4px;
}

.chip {
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 0.78rem;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  transition: all 0.15s;
  white-space: nowrap;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ===== School Card ===== */
.school-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 14px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.school-card:hover { box-shadow: var(--shadow-md); }

.school-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
.school-card-header:hover { background: #fafaf9; }

.school-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

.school-name {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.02em;
}

.school-location {
  font-size: 0.78rem;
  color: var(--text-tertiary);
}

.tags {
  display: flex;
  gap: 5px;
}

.tag {
  padding: 2px 7px;
  border-radius: 3px;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  line-height: 1.6;
}
.tag-985 { background: var(--tag-985); color: var(--tag-985-text); }
.tag-211 { background: var(--tag-211); color: var(--tag-211-text); }
.tag-df { background: var(--tag-df); color: var(--tag-df-text); }
.tag-pub { background: var(--tag-pub); color: var(--tag-pub-text); }
.tag-other { background: var(--bg); color: var(--text-tertiary); }

.school-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.program-count-badge {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--text-secondary);
  background: var(--bg);
  padding: 3px 10px;
  border-radius: 10px;
}

.expand-icon {
  font-size: 0.8rem;
  color: var(--text-tertiary);
  transition: transform 0.2s;
}
.school-card.open .expand-icon { transform: rotate(180deg); }

/* ===== Program Table ===== */
.program-table-wrap {
  display: none;
  border-top: 1px solid var(--border);
}
.school-card.open .program-table-wrap { display: block; }

.program-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}

.program-table th {
  text-align: left;
  padding: 10px 16px;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  background: #fafaf9;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.program-table td {
  padding: 10px 16px;
  border-bottom: 1px solid #f0efed;
  vertical-align: top;
}

.program-table tr:last-child td { border-bottom: none; }
.program-table tr:hover td { background: #fcfcfb; }

.college-name {
  font-size: 0.81rem;
  font-weight: 600;
  color: var(--text);
}

.program-code {
  font-family: var(--mono);
  font-size: 0.76rem;
  color: var(--text-secondary);
  background: var(--bg);
  padding: 1px 6px;
  border-radius: 3px;
}

.mode-badge {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 3px;
  font-size: 0.7rem;
  font-weight: 500;
}
.mode-full { background: #eaf5ef; color: var(--full); }
.mode-part { background: #fdf5e6; color: var(--part); }

.degree-badge {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 3px;
  font-size: 0.7rem;
  font-weight: 500;
  background: var(--accent-light);
  color: var(--accent);
}

.score-cell {
  font-family: var(--mono);
  font-weight: 600;
  text-align: center;
}

.score-na {
  color: var(--text-tertiary);
  font-weight: 400;
}

.research-dir {
  font-size: 0.75rem;
  color: var(--text-tertiary);
  max-width: 240px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ===== Province Section Header ===== */
.province-section-header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin: 28px 0 14px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
}

.province-section-header h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
}

.province-section-header .meta {
  font-size: 0.78rem;
  color: var(--text-tertiary);
}

/* ===== No Results ===== */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-tertiary);
}

/* ===== Responsive ===== */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .main { margin-left: 0; max-width: 100%; padding: 20px 16px 60px; }
  .program-table { font-size: 0.75rem; }
  .program-table th, .program-table td { padding: 8px 10px; }
  .research-dir { max-width: 120px; }
}

/* ===== Scrollbar ===== */
.province-list::-webkit-scrollbar { width: 4px; }
.province-list::-webkit-scrollbar-track { background: transparent; }
.province-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

@media print {
  .sidebar, .filter-row, .expand-icon { display: none; }
  .school-card { break-inside: avoid; border: 1px solid #ccc; }
  .program-table-wrap { display: block !important; }
}
</style>

// ===== Flatten and organize =====
function getProvinceList() {
  return Object.keys(data).sort((a, b) => {
    // Sort by school count desc
    return data[b].length - data[a].length;
  });
}

function getTagClass(tier) {
  if (tier === '985') return 'tag-985';
  if (tier === '211') return 'tag-211';
  if (tier === 'DOUBLE_FIRST' || tier === '双一流') return 'tag-df';
  if (tier === 'PUBLIC_REGULAR' || tier === '普通公办') return 'tag-pub';
  return 'tag-other';
}

function getTagLabel(school) {
  const tags = [];
  if (school.is_985) tags.push('985');
  if (school.is_211) tags.push('211');
  if (school.is_double_first && !school.is_985 && !school.is_211) tags.push('双一流');
  if (!school.is_985 && !school.is_211 && !school.is_double_first) tags.push('公办');
  return tags;
}

// ===== State =====
let activeProvince = 'all';
let activeMode = 'all';
let activeDegree = 'all';
let searchTerm = '';
let expandedSchools = new Set();

// ===== Render =====
function getFilteredSchools() {
  let result = [];
  const provinces = activeProvince === 'all' ? getProvinceList() : [activeProvince];

  for (const prov of provinces) {
    const schools = data[prov] || [];
    for (const school of schools) {
      // Search filter
      if (searchTerm && !school.school.includes(searchTerm)) continue;

      // Filter programs
      const filteredPrograms = school.programs.filter(p => {
        if (activeMode === 'full_time' && p.mode !== '全日制') return false;
        if (activeMode === 'part_time' && p.mode !== '非全日制') return false;
        if (activeDegree === 'academic' && p.degree !== '学硕') return false;
        if (activeDegree === 'professional' && p.degree !== '专硕') return false;
        return true;
      });

      if (filteredPrograms.length > 0) {
        result.push({ province: prov, ...school, programs: filteredPrograms });
      }
    }
  }
  return result;
}

function renderProvinceList() {
  const provinces = getProvinceList();
  const totalSchools = Object.values(data).flat().length;
  let totalPrograms = 0;
  Object.values(data).flat().forEach(s => totalPrograms += s.programs.length);

  document.getElementById('totalSchools').textContent = totalSchools;
  document.getElementById('totalPrograms').textContent = totalPrograms;
  document.getElementById('sidebarFooter').textContent = `${provinces.length} 个省份 · ${totalSchools} 所学校`;

  const list = document.getElementById('provinceList');
  list.innerHTML = `
    <div class="province-item active" data-province="all" onclick="selectProvince('all', this)">
      全部省份
      <span class="count">${totalSchools}</span>
    </div>
    ${provinces.map(p => `
      <div class="province-item" data-province="${p}" onclick="selectProvince('${p}', this)">
        ${p}
        <span class="count">${data[p].length}</span>
      </div>
    `).join('')}
  `;
}

function selectProvince(prov, el) {
  activeProvince = prov;
  document.querySelectorAll('.province-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  renderContent();
}

function filterMode(mode, el) {
  activeMode = mode;
  document.querySelectorAll('[data-mode]').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderContent();
}

function filterDegree(degree, el) {
  activeDegree = degree;
  document.querySelectorAll('[data-degree]').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderContent();
}

function searchSchools() {
  searchTerm = document.getElementById('schoolSearch').value.trim();
  renderContent();
}

function toggleSchool(schoolId) {
  if (expandedSchools.has(schoolId)) {
    expandedSchools.delete(schoolId);
  } else {
    expandedSchools.add(schoolId);
  }
  renderContent();
}

function renderContent() {
  const filtered = getFilteredSchools();

  if (filtered.length === 0) {
    document.getElementById('contentArea').innerHTML = '<div class="empty">没有匹配结果</div>';
    return;
  }

  // Group by province
  const grouped = {};
  filtered.forEach(s => {
    if (!grouped[s.province]) grouped[s.province] = [];
    grouped[s.province].push(s);
  });

  let html = '';

  for (const [prov, schools] of Object.entries(grouped)) {
    html += `
      <div class="province-section-header">
        <h3>${prov}</h3>
        <span class="meta">${schools.length} 所学校 · ${schools.reduce((sum, s) => sum + s.programs.length, 0)} 个方向</span>
      </div>
    `;

    for (const school of schools) {
      const schoolId = `${school.province}-${school.school}`;
      const open = expandedSchools.has(schoolId);
      const tags = getTagLabel(school);

      html += `
        <div class="school-card ${open ? 'open' : ''}">
          <div class="school-card-header" onclick="toggleSchool('${schoolId}')">
            <div class="school-info">
              <div>
                <div class="school-name">${school.school}</div>
                <div class="school-location">${school.city}</div>
              </div>
              <div class="tags">
                ${tags.map(t => `<span class="tag ${getTagClass(t === '公办' ? 'PUBLIC_REGULAR' : t)}">${t}</span>`).join('')}
              </div>
            </div>
            <div class="school-right">
              <span class="program-count-badge">${school.programs.length} 个方向</span>
              <span class="expand-icon">▾</span>
            </div>
          </div>
          <div class="program-table-wrap">
            <table class="program-table">
              <thead>
                <tr>
                  <th>学院</th>
                  <th>专业代码</th>
                  <th>专业名称</th>
                  <th>学习方式</th>
                  <th>学位</th>
                  <th>复试线</th>
                  <th>统考名额</th>
                  <th>录取最低分</th>
                  <th>录取均分</th>
                </tr>
              </thead>
              <tbody>
                ${school.programs.map(p => `
                  <tr>
                    <td class="college-name">${p.college}</td>
                    <td><span class="program-code">${p.code}</span></td>
                    <td>${p.name}</td>
                    <td><span class="mode-badge ${p.mode === '全日制' ? 'mode-full' : 'mode-part'}">${p.mode}</span></td>
                    <td><span class="degree-badge">${p.degree}</span></td>
                    <td class="score-cell">${p.score}</td>
                    <td class="score-cell">${p.quota || '-'}</td>
                    <td class="score-cell">${p.minScore != null ? p.minScore : '<span class="score-na">-</span>'}</td>
                    <td class="score-cell">${p.avgScore != null ? p.avgScore : '<span class="score-na">-</span>'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }
  }

  document.getElementById('contentArea').innerHTML = html;
}

// ===== Init =====
document.addEventListener('DOMContentLoaded', () => {
  renderProvinceList();
  renderContent();
});
</script>
