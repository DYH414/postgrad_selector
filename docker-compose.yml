version: "3.8"

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: postgrad-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # 管理后台
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  rabbitmq-data:
